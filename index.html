<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>bytebox</title>
<link rel="apple-touch-icon" sizes="180x180" href="byteboximg.jpg">
<link rel="icon" type="image/png" sizes="32x32" href="byteboximg.jpg">
<link rel="icon" type="image/png" sizes="16x16" href="byteboximg.jpg">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --surface2: #1c2333;
    --border: #2a3146;
    --border2: #374160;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #4f8ef7;
    --accent-light: rgba(79,142,247,0.12);
    --accent-border: rgba(79,142,247,0.3);
    --green: #34d399;
    --green-light: rgba(52,211,153,0.1);
    --green-border: rgba(52,211,153,0.3);
    --red: #f87171;
    --red-light: rgba(248,113,113,0.1);
    --red-border: rgba(248,113,113,0.3);
    --orange: #fb923c;
    --orange-light: rgba(251,146,60,0.1);
    --orange-border: rgba(251,146,60,0.3);
    --purple: #a78bfa;
    --purple-light: rgba(167,139,250,0.1);
    --purple-border: rgba(167,139,250,0.3);
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 18px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 23px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo-dot { color: var(--accent); }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    color: var(--muted);
    font-family: var(--sans);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.loading { background: var(--orange); animation: none; }
  .status-dot.error { background: var(--red); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 16px;
    gap: 2px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 11px 16px;
    font-size: 16px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── EDITOR SCREEN ── */
  .editor-wrap {
    padding: 14px 16px;
  }

  .snippet-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 12px;
    padding-bottom: 2px;
  }
  .snippet-bar::-webkit-scrollbar { display: none; }
  .snippet-chip {
    flex-shrink: 0;
    font-size: 18px;
    font-family: var(--sans);
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .snippet-chip:active { transform: scale(0.97); }
  .snippet-chip.active-chip {
    background: var(--accent-light);
    border-color: var(--accent-border);
    color: var(--accent);
  }

  .editor-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .editor-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .editor-filename {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--muted);
  }
  .editor-actions { display: flex; gap: 6px; }
  .icon-btn {
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .icon-btn:active { transform: scale(0.96); }

  .editor-body {
    display: flex;
    background: var(--surface);
    min-height: 220px;
    overflow: hidden;
  }
  .line-numbers {
    padding: 14px 10px 14px 12px;
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1.75;
    color: var(--muted);
    text-align: right;
    user-select: none;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    min-width: 40px;
    white-space: pre;
    overflow: hidden;
  }
  .code-area {
    flex: 1;
    min-height: 220px;
    padding: 14px 14px 14px 12px;
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1.75;
    border: none;
    outline: none;
    background: var(--surface);
    color: var(--text);
    resize: vertical;
    -webkit-overflow-scrolling: touch;
    tab-size: 4;
    white-space: pre;
    overflow-wrap: normal;
    overflow-x: auto;
  }

  .run-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
  }
  .run-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .run-btn:active { transform: scale(0.98); opacity: 0.9; }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .clear-btn {
    padding: 13px 16px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 23px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:active { transform: scale(0.97); }

  /* ── OUTPUT ── */
  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .output-label {
    font-size: 18px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: var(--sans);
  }
  .output-time {
    font-size: 23px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .output-body {
    padding: 14px;
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1.8;
    min-height: 80px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }
  .output-body.empty { color: var(--muted); font-family: var(--sans); font-size: 17px; }
  .output-body.error-out { color: var(--red); }
  .output-body.success-out { }
  .output-border-success { border-top: 2px solid var(--green); }
  .output-border-error { border-top: 2px solid var(--red); }
  .output-border-default { border-top: 2px solid transparent; }

  /* ── SNIPPETS SCREEN ── */
  .list-wrap { padding: 14px 16px; }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: var(--sans);
  }
  .snippet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .snippet-card:active { border-color: var(--accent); }
  .snippet-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .snippet-card-title {
    font-size: 23px;
    font-weight: 600;
    color: var(--text);
  }
  .snippet-tag {
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--sans);
  }
  .tag-green { background: var(--green-light); color: var(--green); border: 1px solid var(--green-border); }
  .tag-blue { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }
  .tag-purple { background: var(--purple-light); color: var(--purple); border: 1px solid var(--purple-border); }
  .tag-orange { background: var(--orange-light); color: var(--orange); border: 1px solid var(--orange-border); }
  .snippet-preview {
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 18px;
    color: var(--muted);
    line-height: 1.6;
    background: var(--surface2);
  }
  .snippet-open-btn {
    display: block;
    width: calc(100% - 28px);
    margin: 10px 14px;
    padding: 9px;
    text-align: center;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
  }
  .snippet-open-btn:active { transform: scale(0.98); }

  /* ── CHALLENGES SCREEN ── */
  .challenge-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .challenge-header {
    padding: 14px 14px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .challenge-num {
    font-family: var(--mono);
    font-size: 23px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .challenge-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .challenge-desc {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.6;
  }
  .challenge-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .difficulty {
    font-size: 23px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: var(--sans);
  }
  .diff-easy { color: var(--green); }
  .diff-medium { color: var(--orange); }
  .diff-hard { color: var(--red); }
  .try-btn {
    padding: 7px 14px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
  }
  .try-btn:active { transform: scale(0.97); }

  /* ── LOADING SPINNER ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MISC ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.7;
  }
  .empty-state .big { font-size: 42px; margin-bottom: 10px; }

  input[type="text"] {
    width: 100%;
    padding: 11px 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 23px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    margin-bottom: 10px;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .save-snippet-area {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: none;
  }
  .save-snippet-area.visible { display: block; }

  /* ── PUZZLES ── */
  .puzzle-wrap { padding: 14px 16px; }
  .puzzle-progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .puzzle-score { font-size: 16px; font-weight: 600; color: var(--green); font-family: var(--sans); }
  .puzzle-counter { font-size: 18px; color: var(--muted); font-family: var(--mono); }
  .puzzle-track { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .puzzle-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); border-radius: 2px; transition: width 0.4s ease; }
  .puzzle-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
  .puzzle-header { padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .puzzle-title-row { flex: 1; }
  .puzzle-num { font-size: 16px; font-family: var(--mono); color: var(--muted); margin-bottom: 3px; }
  .puzzle-title { font-size: 18px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .puzzle-diff { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; padding: 3px 9px; border-radius: 20px; font-family: var(--sans); flex-shrink: 0; }
  .pdiff-easy { background: var(--green-light); color: var(--green); border: 1px solid var(--green-border); }
  .pdiff-medium { background: var(--orange-light); color: var(--orange); border: 1px solid var(--orange-border); }
  .puzzle-desc { padding: 12px 14px 8px; font-size: 16px; color: #94a3b8; line-height: 1.65; }
  .puzzle-expected { margin: 0 14px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .puzzle-expected-label { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-family: var(--sans); margin-bottom: 5px; }
  .puzzle-expected-val { font-family: var(--mono); font-size: 18px; color: var(--green); white-space: pre; }
  .puzzle-editor-wrap { border-top: 1px solid var(--border); }
  .puzzle-editor-body { display: flex; background: var(--surface); min-height: 140px; }
  .puzzle-line-numbers { padding: 12px 10px 12px 12px; font-family: var(--mono); font-size: 16px; line-height: 1.75; color: var(--muted); text-align: right; user-select: none; background: var(--surface2); border-right: 1px solid var(--border); min-width: 38px; white-space: pre; overflow: hidden; }
  .puzzle-code { flex: 1; min-height: 140px; padding: 12px; font-family: var(--mono); font-size: 16px; line-height: 1.75; border: none; outline: none; background: var(--surface); color: var(--text); resize: vertical; tab-size: 4; white-space: pre; overflow-wrap: normal; overflow-x: auto; }
  .puzzle-actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); background: var(--surface2); }
  .check-btn { flex: 1; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--sans); font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .check-btn:active { transform: scale(0.98); }
  .check-btn:disabled { opacity: 0.5; }
  .hint-btn { padding: 11px 14px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .reset-btn { padding: 11px 12px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 16px; cursor: pointer; }
  .puzzle-result { margin: 0 14px 12px; padding: 11px 14px; border-radius: var(--radius-sm); font-size: 16px; font-family: var(--sans); line-height: 1.5; display: none; }
  .puzzle-result.pass { display: block; background: var(--green-light); border: 1px solid var(--green-border); color: var(--green); }
  .puzzle-result.fail { display: block; background: var(--red-light); border: 1px solid var(--red-border); color: var(--red); }
  .puzzle-result.hint-show { display: block; background: var(--orange-light); border: 1px solid var(--orange-border); color: var(--orange); }
  .solved-badge { display: none; font-size: 16px; font-weight: 700; color: var(--green); font-family: var(--sans); padding: 2px 7px; background: var(--green-light); border: 1px solid var(--green-border); border-radius: 20px; margin-left: 6px; }
  .solved-badge.visible { display: inline-block; }
  .all-solved { text-align: center; padding: 40px 20px; display: none; }
  .all-solved.visible { display: block; }
  .all-solved .trophy { font-size: 58px; margin-bottom: 12px; }
  .all-solved h3 { font-size: 23px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .all-solved p { font-size: 17px; color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo"><img src="byteboximg.png" alt="bytebox" style="height:32px; width:32px; object-fit:contain; border-radius:8px; vertical-align:middle; margin-right:8px;">byte<span class="logo-dot">box</span></div>
  <div class="status-pill">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">ready</span>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('editor')">Editor</button>
  <button class="tab" onclick="switchTab('snippets')">Snippets</button>
  <button class="tab" onclick="switchTab('challenges')">Challenges</button>
  <button class="tab" onclick="switchTab('puzzles')">Fix It</button>
</div>

<!-- ── EDITOR ── -->
<div id="editor" class="screen active">
  <div class="editor-wrap">

    <!-- Quick-load chips -->
    <div class="snippet-bar" id="quick-chips"></div>

    <!-- Code editor -->
    <div class="editor-card">
      <div class="editor-topbar">
        <span class="editor-filename">main.py</span>
        <div class="editor-actions">
          <button class="icon-btn" onclick="clearCode()">Clear</button>
          <button class="icon-btn" onclick="toggleSaveArea()">Save snippet</button>
        </div>
      </div>
      <div class="editor-body">
        <div class="line-numbers" id="line-numbers">1</div>
        <textarea class="code-area" id="code-editor" spellcheck="false" autocorrect="off" autocapitalize="off">print("Hello from bytebox!")
</textarea>
      </div>
      <div class="save-snippet-area" id="save-area">
        <input type="text" id="snippet-name" placeholder="Snippet name..." />
        <button class="run-btn" style="width:100%;margin-top:0;" onclick="saveSnippet()">Save</button>
      </div>
    </div>

    <!-- Run / Clear -->
    <div class="run-bar">
      <button class="run-btn" id="run-btn" onclick="runCode()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2l9 5-9 5V2z" fill="white"/></svg>
        Run Python
      </button>
      <button class="clear-btn" onclick="clearOutput()">Clear output</button>
    </div>

    <!-- Output -->
    <div class="output-card output-border-default" id="output-card">
      <div class="output-header">
        <span class="output-label">Output</span>
        <span class="output-time" id="output-time"></span>
      </div>
      <div class="output-body empty" id="output-body">Run your code to see output here.</div>
    </div>

  </div>
</div>

<!-- ── SNIPPETS ── -->
<div id="snippets" class="screen">
  <div class="list-wrap">
    <p class="section-title">Saved snippets</p>
    <div id="snippets-list"></div>
  </div>
</div>

<!-- ── CHALLENGES ── -->
<div id="challenges" class="screen">
  <div class="list-wrap">
    <p class="section-title">Python challenges</p>
    <div id="challenges-list"></div>
  </div>
</div>

function transpileAndRun(rawCode) {
  const printLog = [];

  // ── stdlib helpers ────────────────────────────────────────────────────────
  const _range = (a, b, step) => {
    if (b === undefined) { b = a; a = 0; }
    if (step === undefined) step = 1;
    const r = [];
    if (step > 0) { for (let i = a; i < b; i += step) r.push(i); }
    else { for (let i = a; i > b; i += step) r.push(i); }
    return r;
  };
  const _len = x => Array.isArray(x) ? x.length : (typeof x === 'string' ? x.length : Object.keys(x).length);
  const _repr = x => {
    if (x === null || x === undefined) return 'None';
    if (typeof x === 'boolean') return x ? 'True' : 'False';
    if (typeof x === 'string') return x;
    if (Array.isArray(x)) return '[' + x.map(_repr).join(', ') + ']';
    if (typeof x === 'object') return '{' + Object.entries(x).map(([k,v]) => `'${k}': ${_repr(v)}`).join(', ') + '}';
    return String(x);
  };
  const _int = x => parseInt(x);
  const _float = x => parseFloat(x);
  const _bool = x => !!x;
  const _list = x => Array.isArray(x) ? [...x] : [...x];
  const _abs = x => Math.abs(x);
  const _max = (...a) => a.length === 1 && Array.isArray(a[0]) ? Math.max(...a[0]) : Math.max(...a);
  const _min = (...a) => a.length === 1 && Array.isArray(a[0]) ? Math.min(...a[0]) : Math.min(...a);
  const _sum = (arr, start=0) => arr.reduce((a,b) => a+b, start);
  const _sorted = (arr, reverse=false) => {
    const s = [...arr].sort((a,b) => typeof a === 'string' ? a.localeCompare(b) : a-b);
    return reverse ? s.reverse() : s;
  };
  const _reversed = arr => [...arr].reverse();
  const _enumerate = (arr, start=0) => arr.map((v,i) => [i+start, v]);
  const _zip = (...arrs) => arrs[0].map((_,i) => arrs.map(a => a[i]));
  const _isinstance = (x, t) => {
    if (t === 'list') return Array.isArray(x);
    if (t === 'int') return Number.isInteger(x);
    if (t === 'str') return typeof x === 'string';
    if (t === 'float') return typeof x === 'number' && !Number.isInteger(x);
    if (t === 'bool') return typeof x === 'boolean';
    if (t === 'dict') return typeof x === 'object' && !Array.isArray(x) && x !== null;
    return false;
  };
  const _input = () => '';
  const _print = (...args) => { printLog.push(args.map(_repr).join(' ')); };

  // ── step 1: strip comments ────────────────────────────────────────────────
  let code = rawCode.split('\n').map(line => {
    // remove inline # comments but not inside strings
    let inStr = false, strChar = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (!inStr && (c === '"' || c === "'")) { inStr = true; strChar = c; }
      else if (inStr && c === strChar && line[i-1] !== '\\') { inStr = false; }
      else if (!inStr && c === '#') { line = line.slice(0, i); break; }
    }
    return line;
  }).join('\n');

  // ── step 2: protect string literals ──────────────────────────────────────
  // Extract all string literals and replace with placeholders so regex
  // transforms below don't accidentally mangle them.
  const strings = [];
  code = code.replace(/(f?"""[\s\S]*?"""|f?'''[\s\S]*?'''|f?"(?:[^"\\]|\\.)*"|f?'(?:[^'\\]|\\.)*')/g, match => {
    const idx = strings.length;
    strings.push(match);
    return `__STR${idx}__`;
  });

  // ── step 3: keyword substitutions (safe – strings are protected) ──────────
  code = code.replace(/\bTrue\b/g, 'true');
  code = code.replace(/\bFalse\b/g, 'false');
  code = code.replace(/\bNone\b/g, 'null');
  code = code.replace(/\band\b/g, '&&');
  code = code.replace(/\bor\b/g, '||');
  code = code.replace(/\bnot\s+/g, '!');
  code = code.replace(/\bpass\b/g, '/* pass */');
  code = code.replace(/\belse\s*:\s*pass\b/g, '');

  // ── step 4: method/builtin mappings ──────────────────────────────────────
  code = code.replace(/\.items\(\)/g, '.__items()');
  code = code.replace(/\.keys\(\)/g, '.__keys()');
  code = code.replace(/\.values\(\)/g, '.__values()');
  code = code.replace(/\.append\(([^)]+)\)/g, '.push($1)');
  code = code.replace(/\.extend\(([^)]+)\)/g, '.__extend($1)');
  code = code.replace(/\.pop\(\)/g, '.pop()');
  code = code.replace(/\.upper\(\)/g, '.toUpperCase()');
  code = code.replace(/\.lower\(\)/g, '.toLowerCase()');
  code = code.replace(/\.strip\(\)/g, '.trim()');
  code = code.replace(/\.split\(([^)]*)\)/g, '.split($1)');
  code = code.replace(/\.join\(([^)]+)\)/g, '.__join($1)');
  code = code.replace(/\.replace\(([^)]+)\)/g, '.replace($1)');
  code = code.replace(/\.startswith\(([^)]+)\)/g, '.startsWith($1)');
  code = code.replace(/\.endswith\(([^)]+)\)/g, '.endsWith($1)');
  code = code.replace(/\.isdigit\(\)/g, '.__isdigit()');
  code = code.replace(/\.isalpha\(\)/g, '.__isalpha()');
  code = code.replace(/\.count\(([^)]+)\)/g, '.__count($1)');
  code = code.replace(/\.index\(([^)]+)\)/g, '.indexOf($1)');
  code = code.replace(/\.sort\(\)/g, '.sort((a,b)=>typeof a==="string"?a.localeCompare(b):a-b)');
  code = code.replace(/\bisinstance\s*\(([^,]+),\s*(\w+)\)/g, '_isinstance($1, "$2")');
  code = code.replace(/\brange\s*\(/g, '_range(');
  code = code.replace(/\blen\s*\(/g, '_len(');
  code = code.replace(/\bstr\s*\(/g, '_repr(');
  code = code.replace(/\bint\s*\(/g, '_int(');
  code = code.replace(/\bfloat\s*\(/g, '_float(');
  code = code.replace(/\bbool\s*\(/g, '_bool(');
  code = code.replace(/\babs\s*\(/g, '_abs(');
  code = code.replace(/\bmax\s*\(/g, '_max(');
  code = code.replace(/\bmin\s*\(/g, '_min(');
  code = code.replace(/\bsum\s*\(/g, '_sum(');
  code = code.replace(/\bsorted\s*\(/g, '_sorted(');
  code = code.replace(/\breversed\s*\(/g, '_reversed(');
  code = code.replace(/\benumerate\s*\(/g, '_enumerate(');
  code = code.replace(/\bzip\s*\(/g, '_zip(');
  code = code.replace(/\blist\s*\(/g, '_list(');
  code = code.replace(/\binput\s*\(/g, '_input(');

  // ── step 5: restore strings and convert them ──────────────────────────────
  code = code.replace(/__STR(\d+)__/g, (_, i) => {
    let s = strings[+i];
    // f-string → template literal
    if (s.startsWith('f"') || s.startsWith("f'")) {
      const inner = s.slice(2, -1);
      const tl = inner.replace(/\{([^}]+)\}/g, '${$1}');
      return '`' + tl + '`';
    }
    // triple-quoted → regular string (collapse newlines)
    if (s.startsWith('"""') || s.startsWith("'''")) {
      const inner = s.slice(3, -3).replace(/`/g, '\\`');
      return '`' + inner + '`';
    }
    // single-quoted → double-quoted
    if (s.startsWith("'")) {
      return '"' + s.slice(1, -1).replace(/"/g, '\\"') + '"';
    }
    return s;
  });

  // ── step 6: print() handling ──────────────────────────────────────────────
  // Must handle: print(), print("x"), print("x", y), print(..., end="")
  // Do this AFTER string restore so we see real content
  code = code.replace(/\bprint\s*\(([^]*?)\)(?=\s*(?:\n|$|;))/gm, (match, inner) => {
    inner = inner.trim();
    // check for end= keyword
    const endMatch = inner.match(/,\s*end\s*=\s*(`[^`]*`|"[^"]*"|'[^']*')\s*$/);
    if (endMatch) {
      const endVal = endMatch[1];
      const args = inner.slice(0, inner.lastIndexOf(',end') < 0 ? inner.lastIndexOf(', end') : inner.lastIndexOf(',end')).trim();
      // remove end= from args properly
      const cleanArgs = inner.replace(/,\s*end\s*=\s*(`[^`]*`|"[^"]*"|'[^']*')\s*$/, '').trim();
      return `printLog.push({v: [${cleanArgs || '""'}].map(_repr).join(" "), end: ${endVal}})`;
    }
    if (!inner) return 'printLog.push({v:"", end:"\\n"})';
    return `printLog.push({v: [${inner}].map(_repr).join(" "), end:"\\n"})`;
  });

  // ── step 7: list comprehension ────────────────────────────────────────────
  code = code.replace(/\[([^\[\]]+)\s+for\s+(\w+)\s+in\s+([^\[\]]+?)(?:\s+if\s+([^\[\]]+?))?\s*\]/g,
    (_, expr, v, iter, cond) => {
      const arr = `Array.from(${iter})`;
      const filtered = cond ? `${arr}.filter(${v} => ${cond})` : arr;
      return `${filtered}.map(${v} => ${expr})`;
    });

  // ── step 8: self → this ───────────────────────────────────────────────────
  code = code.replace(/\bself\b/g, 'this');

  // ── step 9: indentation → braces ─────────────────────────────────────────
  code = convertBlocks(code);

  // ── step 10: build and run ────────────────────────────────────────────────
  // Inject prototype helpers for dict methods
  const prologue = `
    Object.defineProperty(Object.prototype, '__items', { value: function(){ return Object.entries(this); }, configurable: true, writable: true });
    Object.defineProperty(Object.prototype, '__keys', { value: function(){ return Object.keys(this); }, configurable: true, writable: true });
    Object.defineProperty(Object.prototype, '__values', { value: function(){ return Object.values(this); }, configurable: true, writable: true });
    Object.defineProperty(Array.prototype, '__extend', { value: function(a){ a.forEach(x => this.push(x)); }, configurable: true, writable: true });
    Object.defineProperty(Array.prototype, '__join', { value: function(sep){ return this.join(sep); }, configurable: true, writable: true });
    Object.defineProperty(String.prototype, '__join', { value: function(arr){ return arr.join(this); }, configurable: true, writable: true });
    Object.defineProperty(String.prototype, '__isdigit', { value: function(){ return /^\\d+$/.test(this); }, configurable: true, writable: true });
    Object.defineProperty(String.prototype, '__isalpha', { value: function(){ return /^[a-zA-Z]+$/.test(this); }, configurable: true, writable: true });
    Object.defineProperty(String.prototype, '__count', { value: function(sub){ return this.split(sub).length - 1; }, configurable: true, writable: true });
    Object.defineProperty(Array.prototype, '__count', { value: function(v){ return this.filter(x => x===v).length; }, configurable: true, writable: true });
  `;

  try {
    const fn = new Function(
      'printLog','_range','_len','_repr','_int','_float','_bool','_list',
      '_abs','_max','_min','_sum','_sorted','_reversed','_enumerate',
      '_zip','_isinstance','_input',
      prologue + '\n"use strict";\n' + code
    );
    fn(printLog,_range,_len,_repr,_int,_float,_bool,_list,
       _abs,_max,_min,_sum,_sorted,_reversed,_enumerate,
       _zip,_isinstance,_input);

    let out = '';
    printLog.forEach(p => {
      if (typeof p === 'string') { out += p + '\n'; }
      else { out += p.v + p.end; }
    });
    return { ok: true, out: out.trimEnd(), err: '' };
  } catch(e) {
    return { ok: false, out: '', err: e.message };
  }
}

function convertBlocks(code) {
  const lines = code.split('\n');
  const out = [];
  const indentStack = [0];
  const declaredVars = new Set(['true','false','null','undefined','printLog']);

  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trimStart();
    i++;

    if (!trimmed) { out.push(''); continue; }

    const indent = line.length - trimmed.length;

    // Close blocks for dedent
    while (indentStack.length > 1 && indent < indentStack[indentStack.length - 1]) {
      out.push(' '.repeat(Math.max(0, indentStack[indentStack.length - 2])) + '}');
      indentStack.pop();
    }

    const sp = ' '.repeat(indent);

    // def __init__
    if (/^def\s+__init__\s*\(/.test(trimmed)) {
      const m = trimmed.match(/^def\s+__init__\s*\(this,?\s*(.*?)\)\s*:/);
      const params = m ? m[1].trim() : '';
      out.push(sp + `constructor(${params}) {`);
      indentStack.push(indent + 1);
    }
    // def (any other function/method)
    else if (/^def\s+\w+\s*\(/.test(trimmed)) {
      const m = trimmed.match(/^def\s+(\w+)\s*\((.*?)\)\s*:/);
      if (m) {
        const params = m[2].replace(/^\s*this,?\s*/, '').trim();
        declaredVars.add(m[1]);
        out.push(sp + `function ${m[1]}(${params}) {`);
        indentStack.push(indent + 1);
      } else out.push(sp + trimmed);
    }
    // class
    else if (/^class\s+\w+/.test(trimmed)) {
      const m = trimmed.match(/^class\s+(\w+)/);
      declaredVars.add(m[1]);
      out.push(sp + `class ${m[1]} {`);
      indentStack.push(indent + 1);
    }
    // for
    else if (/^for\s+.+\s+in\s+.+\s*:/.test(trimmed)) {
      const m = trimmed.match(/^for\s+(.+?)\s+in\s+(.+?)\s*:/);
      if (m) {
        const vars = m[1].trim();
        const iter = m[2].trim();
        vars.split(',').map(v => v.trim().replace(/[\[\]]/g,'')).forEach(v => declaredVars.add(v));
        if (vars.includes(',')) {
          out.push(sp + `for (const [${vars}] of Array.from(${iter})) {`);
        } else {
          out.push(sp + `for (const ${vars} of Array.from(${iter})) {`);
        }
        indentStack.push(indent + 1);
      } else out.push(sp + trimmed);
    }
    // while
    else if (/^while\s+.+\s*:/.test(trimmed)) {
      const m = trimmed.match(/^while\s+(.+?)\s*:/);
      const guardVar = `__guard${Math.floor(Math.random()*99999)}`;
      out.push(sp + `let ${guardVar} = 0;`);
      out.push(sp + `while (${m[1]}) { if (++${guardVar} > 10000) { throw new Error("Infinite loop detected — check your loop condition"); }`);
      indentStack.push(indent + 1);
    }
    // if
    else if (/^if\s+.+\s*:/.test(trimmed)) {
      const m = trimmed.match(/^if\s+(.+?)\s*:/);
      out.push(sp + `if (${m[1]}) {`);
      indentStack.push(indent + 1);
    }
    // elif
    else if (/^elif\s+.+\s*:/.test(trimmed)) {
      if (out.length) out.pop();
      if (indentStack.length > 1) indentStack.pop();
      const m = trimmed.match(/^elif\s+(.+?)\s*:/);
      out.push(sp + `} else if (${m[1]}) {`);
      indentStack.push(indent + 1);
    }
    // else
    else if (/^else\s*:/.test(trimmed)) {
      if (out.length) out.pop();
      if (indentStack.length > 1) indentStack.pop();
      out.push(sp + '} else {');
      indentStack.push(indent + 1);
    }
    // return
    else if (/^return\b/.test(trimmed)) {
      out.push(sp + trimmed);
    }
    // this.x = ... (was self.x)
    else if (/^this\./.test(trimmed)) {
      out.push(sp + trimmed);
    }
    // plain assignment: varname = value
    else if (/^[a-zA-Z_]\w*\s*=(?!=)/.test(trimmed)) {
      const varName = trimmed.match(/^([a-zA-Z_]\w*)\s*=/)[1];
      if (declaredVars.has(varName)) {
        out.push(sp + trimmed);
      } else {
        declaredVars.add(varName);
        out.push(sp + 'let ' + trimmed);
      }
    }
    // everything else (function calls, compound ops +=, etc.)
    else {
      out.push(sp + trimmed);
    }
  }

  // close remaining open blocks
  while (indentStack.length > 1) {
    out.push(' '.repeat(Math.max(0, indentStack[indentStack.length - 2])) + '}');
    indentStack.pop();
  }

  return out.join('\n');
}

// ── RUN CODE ──────────────────────────────────────────────────────────────────
function runCode() {
  const code = document.getElementById('code-editor').value;
  const btn = document.getElementById('run-btn');
  const body = document.getElementById('output-body');
  const card = document.getElementById('output-card');
  const timeEl = document.getElementById('output-time');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Running...';
  setStatus('loading', 'running');
  body.className = 'output-body';
  body.textContent = '';
  card.className = 'output-card output-border-default';
  timeEl.textContent = '';

  setTimeout(() => {
    const start = Date.now();
    const result = runPython(code);
    const elapsed = ((Date.now() - start) / 1000).toFixed(2);
    timeEl.textContent = elapsed + 's';

    if (!result.ok) {
      body.className = 'output-body error-out';
      body.textContent = 'Error: ' + result.err;
      card.className = 'output-card output-border-error';
      setStatus('error', 'error');
    } else if (!result.out.trim()) {
      body.className = 'output-body empty';
      body.textContent = '(no output)';
      card.className = 'output-card output-border-default';
      setStatus('ready', 'ready');
    } else {
      body.className = 'output-body success-out';
      body.textContent = result.out;
      card.className = 'output-card output-border-success';
      setStatus('ready', 'done');
    }

    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2l9 5-9 5V2z" fill="white"/></svg> Run Python';
  }, 80);
}

function clearCode() {
  document.getElementById('code-editor').value = '';
  document.getElementById('code-editor').focus();
}

function clearOutput() {
  const body = document.getElementById('output-body');
  body.className = 'output-body empty';
  body.textContent = 'Run your code to see output here.';
  document.getElementById('output-card').className = 'output-card output-border-default';
  document.getElementById('output-time').textContent = '';
  setStatus('ready', 'ready');
}

// ── SNIPPETS ──────────────────────────────────────────────────────────────────
function loadSnippetToEditor(code) {
  document.getElementById('code-editor').value = code;
  updateLineNumbers();
  switchTab('editor');
}

// Store snippet code by ID so onclick can reference by ID safely
const snippetStore = {};
builtinSnippets.forEach(s => { snippetStore[s.id] = s.code; });

function loadSnippetById(id) {
  const code = snippetStore[id] || '';
  loadSnippetToEditor(code);
}

function renderQuickChips() {
  const bar = document.getElementById('quick-chips');
  bar.innerHTML = '';
  builtinSnippets.slice(0, 5).forEach(s => {
    const chip = document.createElement('button');
    chip.className = 'snippet-chip';
    chip.textContent = s.name;
    chip.onclick = () => {
      document.querySelectorAll('.snippet-chip').forEach(c => c.classList.remove('active-chip'));
      chip.classList.add('active-chip');
      loadSnippetById(s.id);
    };
    bar.appendChild(chip);
  });
}

function renderSnippets() {
  const el = document.getElementById('snippets-list');
  const all = [...builtinSnippets, ...userSnippets];
  if (all.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="big">📭</div>No snippets yet. Save some code from the editor!</div>';
    return;
  }
  el.innerHTML = '';

  if (builtinSnippets.length) {
    const label = document.createElement('p');
    label.className = 'section-title';
    label.style.marginBottom = '10px';
    label.textContent = 'Built-in';
    el.appendChild(label);
    builtinSnippets.forEach(s => el.appendChild(makeSnippetCard(s, false)));
  }

  if (userSnippets.length) {
    const label = document.createElement('p');
    label.className = 'section-title';
    label.style.marginTop = '14px';
    label.style.marginBottom = '10px';
    label.textContent = 'Your snippets';
    el.appendChild(label);
    userSnippets.forEach(s => el.appendChild(makeSnippetCard(s, true)));
  }
}

function makeSnippetCard(s, deletable) {
  const card = document.createElement('div');
  card.className = 'snippet-card';
  const preview = s.code.split('\n').slice(0, 3).join('\n');
  // Store code in the map so it's safely accessible by ID
  snippetStore[s.id] = s.code;
  card.innerHTML = `
    <div class="snippet-card-header">
      <span class="snippet-card-title">${s.name}</span>
      <span class="snippet-tag ${s.tagClass || 'tag-green'}">${s.tag || 'snippet'}</span>
    </div>
    <div class="snippet-preview">${escHtml(preview)}</div>
    <button class="snippet-open-btn" onclick="loadSnippetById('${s.id}')">Open in editor</button>
    ${deletable ? `<button class="snippet-open-btn" style="color:var(--red);border-color:var(--red-border);background:var(--red-light);margin-top:0;" onclick="deleteSnippet('${s.id}')">Delete</button>` : ''}
  `;
  return card;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleSaveArea() {
  const area = document.getElementById('save-area');
  area.classList.toggle('visible');
  if (area.classList.contains('visible')) document.getElementById('snippet-name').focus();
}

function saveSnippet() {
  const name = document.getElementById('snippet-name').value.trim();
  const code = document.getElementById('code-editor').value;
  if (!name) { alert('Please enter a snippet name.'); return; }
  const snippet = { id: 'u_' + Date.now(), name, tag: 'mine', tagClass: 'tag-blue', code };
  userSnippets.push(snippet);
  localStorage.setItem('bytebox_snippets', JSON.stringify(userSnippets));
  document.getElementById('snippet-name').value = '';
  document.getElementById('save-area').classList.remove('visible');
  alert('Snippet saved!');
}

function deleteSnippet(id) {
  userSnippets = userSnippets.filter(s => s.id !== id);
  localStorage.setItem('bytebox_snippets', JSON.stringify(userSnippets));
  renderSnippets();
}

// ── CHALLENGES ────────────────────────────────────────────────────────────────
function renderChallenges() {
  const el = document.getElementById('challenges-list');
  el.innerHTML = '';
  challenges.forEach(c => {
    const card = document.createElement('div');
    card.className = 'challenge-card';
    card.innerHTML = `
      <div class="challenge-header">
        <div style="flex:1;">
          <div class="challenge-num"># ${c.num}</div>
          <div class="challenge-title">${c.title}</div>
          <div class="challenge-desc">${c.desc}</div>
        </div>
      </div>
      <div class="challenge-footer">
        <span class="difficulty diff-${c.difficulty}">${c.difficulty}</span>
        <button class="try-btn" onclick="loadChallenge(${challenges.indexOf(c)})">Try it →</button>
      </div>
    `;
    el.appendChild(card);
  });
}

function loadChallenge(i) {
  document.getElementById('code-editor').value = challenges[i].hint;
  switchTab('editor');
}

const puzzleSolved = {};

function renderPuzzles() {
  if (Object.keys(puzzleSolved).length === 0) updatePuzzleProgress();
  const el = document.getElementById('puzzles-list');
  if (el.children.length > 0) return; // already rendered, don't re-render
  el.innerHTML = '';
  puzzles.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'puzzle-card';
    card.id = 'pcard-' + p.id;
    card.innerHTML = `
      <div class="puzzle-header">
        <div class="puzzle-title-row">
          <div class="puzzle-num">bug #${String(idx+1).padStart(2,'0')}</div>
          <div class="puzzle-title">
            ${p.title}
            <span class="solved-badge ${puzzleSolved[p.id] ? 'visible' : ''}" id="badge-${p.id}">✓ fixed</span>
          </div>
        </div>
        <span class="puzzle-diff pdiff-${p.difficulty}">${p.difficulty}</span>
      </div>
      <div class="puzzle-desc">${p.desc}</div>
      <div class="puzzle-expected">
        <div class="puzzle-expected-label">Expected output</div>
        <div class="puzzle-expected-val">${escHtml(p.expected)}</div>
      </div>
      <div class="puzzle-editor-wrap">
        <div class="puzzle-editor-body">
          <div class="puzzle-line-numbers" id="pln-${p.id}">${p.broken.split('\n').map((_,i)=>i+1).join('\n')}</div>
          <textarea class="puzzle-code" id="ped-${p.id}" spellcheck="false" autocorrect="off" autocapitalize="off"
            oninput="syncPuzzleLines('${p.id}')"
            onscroll="document.getElementById('pln-${p.id}').scrollTop=this.scrollTop"
          >${p.broken}</textarea>
        </div>
      </div>
      <div class="puzzle-result" id="pres-${p.id}"></div>
      <div class="puzzle-actions">
        <button class="check-btn" id="pbtn-${p.id}" onclick="checkPuzzle('${p.id}')">Check fix</button>
        <button class="hint-btn" onclick="showPuzzleHint('${p.id}')">Hint</button>
        <button class="reset-btn" onclick="resetPuzzle('${p.id}')">↺</button>
      </div>
    `;
    el.appendChild(card);

    // Tab key support
    const ta = card.querySelector(`#ped-${p.id}`);
    ta.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.slice(0, s) + '    ' + ta.value.slice(end);
        ta.selectionStart = ta.selectionEnd = s + 4;
        syncPuzzleLines(p.id);
      }
    });
  });
  updatePuzzleProgress();
}

function syncPuzzleLines(id) {
  const ta = document.getElementById('ped-' + id);
  const ln = document.getElementById('pln-' + id);
  const lines = ta.value.split('\n').length;
  ln.textContent = Array.from({length: lines}, (_, i) => i + 1).join('\n');
}

function checkPuzzle(id) {
  const puzzle = puzzles.find(p => p.id === id);
  const code = document.getElementById('ped-' + id).value;
  const res = document.getElementById('pres-' + id);
  const btn = document.getElementById('pbtn-' + id);

  btn.disabled = true;
  btn.textContent = 'Checking...';

  setTimeout(() => {
    const result = runPython(code);
    const actual = (result.out || '').trim();
    const expected = puzzle.expected.trim();

    if (result.ok && actual === expected) {
      res.className = 'puzzle-result pass';
      res.textContent = '✓ Perfect! Bug squashed. Output matches exactly.';
      btn.textContent = '✓ Solved';
      btn.style.background = 'var(--green)';
      puzzleSolved[id] = true;
      document.getElementById('badge-' + id).classList.add('visible');
      updatePuzzleProgress();
    } else if (!result.ok) {
      res.className = 'puzzle-result fail';
      res.textContent = '✗ Your code has an error: ' + result.err;
      btn.disabled = false;
      btn.textContent = 'Check fix';
    } else {
      res.className = 'puzzle-result fail';
      res.innerHTML = `✗ Not quite. Got: <span style="font-family:var(--mono)">${escHtml(actual || '(no output)')}</span> — expected: <span style="font-family:var(--mono)">${escHtml(expected)}</span>`;
      btn.disabled = false;
      btn.textContent = 'Check fix';
    }
  }, 80);
}

function showPuzzleHint(id) {
  const puzzle = puzzles.find(p => p.id === id);
  const res = document.getElementById('pres-' + id);
  res.className = 'puzzle-result hint-show';
  res.textContent = '💡 ' + puzzle.hint;
}

function resetPuzzle(id) {
  const puzzle = puzzles.find(p => p.id === id);
  const ta = document.getElementById('ped-' + id);
  ta.value = puzzle.broken;
  syncPuzzleLines(id);
  const res = document.getElementById('pres-' + id);
  res.className = 'puzzle-result';
  res.textContent = '';
  if (!puzzleSolved[id]) {
    const btn = document.getElementById('pbtn-' + id);
    btn.disabled = false;
    btn.textContent = 'Check fix';
    btn.style.background = '';
  }
}

function updatePuzzleProgress() {
  const solved = Object.keys(puzzleSolved).length;
  const total = puzzles.length;
  document.getElementById('puzzle-score').textContent = solved + ' solved';
  document.getElementById('puzzle-counter').textContent = solved + ' / ' + total;
  document.getElementById('puzzle-fill').style.width = Math.round((solved / total) * 100) + '%';
  if (solved === total) {
    document.getElementById('all-solved').classList.add('visible');
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderQuickChips();
renderChallenges();
// Line numbers init after DOM is ready
window.addEventListener('load', () => {

  if (ta) {
    updateLineNumbers();
    ta.addEventListener('input', updateLineNumbers);
    ta.addEventListener('scroll', () => {
      document.getElementById('line-numbers').scrollTop = ta.scrollTop;
    });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.slice(0, s) + '    ' + ta.value.slice(end);
        ta.selectionStart = ta.selectionEnd = s + 4;
        updateLineNumbers();
      }
    });
  }
});
